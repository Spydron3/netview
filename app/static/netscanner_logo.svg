  <circle cx="340" cy="240" r="108" fill="none" stroke="#3B82F6" stroke-width="0.8" style="fill:none;stroke:rgb(59, 130, 246);color:rgb(255, 255, 255);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.195991;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
